name: Build & Deploy (Safe Atomic)

on:
  push:
    branches:
      - main
      - ssr
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      RELEASE_NAME: release-${{ github.run_id }}

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Node setup
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # Build frontend
      # =========================
      - name: Install frontend deps
        working-directory: client
        run: npm ci

      - name: Generate Nuxt build
        working-directory: client
        run: npm run generate

      # Safety check (prevents empty deploys)
      - name: Validate build output
        run: test -d client/.output/public

      # =========================
      # SSH setup
      # =========================
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # =========================
      # Create remote release folder
      # =========================
      - name: Prepare remote release directory
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "mkdir -p /var/www/releases/${{ env.RELEASE_NAME }}"

      # =========================
      # Deploy frontend (NO DELETE)
      # =========================
      - name: Deploy frontend (safe)
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            ./client/.output/public/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/releases/${{ env.RELEASE_NAME }}/client

      # =========================
      # Deploy API (safe, no delete)
      # =========================
      - name: Deploy Symfony API
        run: |
          rsync -az \
            --exclude vendor \
            --exclude var \
            --exclude .env.local \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            ./api/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/releases/${{ env.RELEASE_NAME }}/api

      # =========================
      # Install backend deps + build
      # =========================
      - name: Install Symfony dependencies (remote)
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "
            cd /var/www/releases/${{ env.RELEASE_NAME }}/api && \
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist && \
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear && \
            APP_ENV=prod php bin/console cache:warmup
          "

      # =========================
      # Atomic switch (zero downtime)
      # =========================
      - name: Activate new release
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "
            ln -sfn /var/www/releases/${{ env.RELEASE_NAME }} /var/www/current
          "

      # =========================
      # Optional cleanup (keep last 3 releases)
      # =========================
      - name: Cleanup old releases
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "
            ls -1dt /var/www/releases/* | tail -n +4 | xargs rm -rf || true
          "