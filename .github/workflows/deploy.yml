name: Deploy (Clean Stable Version)

on:
  push:
    branches:
      - main
      - ssr
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Node setup
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # Build frontend
      # =========================
      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run generate

      # =========================
      # SSH setup
      # =========================
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # =========================
      # DEPLOY FRONTEND
      # =========================
      - name: Deploy frontend
        run: |
          rsync -r --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            ./client/.output/public/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/client/

      # =========================
      # DEPLOY API CODE
      # =========================
      - name: Deploy API source
        run: |
          rsync -r \
            --exclude .env.local \
            --exclude .env \
            --exclude vendor \
            --exclude var/cache \
            --exclude var/log \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            ./api/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/api/

      # =========================
      # DEPLOY COMPOSE FILE
      # =========================
      - name: Deploy docker-compose
        run: |
          rsync -r \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            api/docker-compose.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/api/

      # =========================
      # BUILD + RESTART CONTAINERS
      # =========================
      - name: Build and restart containers
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "
            set -e
            cd /var/www/html/api

            echo 'Stopping containers...'
            docker-compose down --remove-orphans || true

            echo 'Building and starting...'
            docker-compose up -d --build --force-recreate

            echo 'Done.'
          "