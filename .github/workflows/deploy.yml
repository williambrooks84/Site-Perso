name: Build & Deploy to VPS

on:
  push:
    branches: [ssr, main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout repo
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Node setup (Nuxt frontend)
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Generate static frontend
        working-directory: client
        run: npm run generate

      # =========================
      # SSH setup
      # =========================
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          if [ -n "$VPS_KNOWN_HOSTS" ]; then
            echo "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          fi

      # =========================
      # Deploy FRONTEND (Nuxt static)
      # =========================
      - name: Deploy frontend
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -p ${VPS_PORT:-22}" \
            ./client/.output/public/ \
            ${VPS_USER}@${VPS_HOST}:${VPS_PATH}

      # =========================
      # Deploy Symfony API
      # =========================
      - name: Deploy API
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_API_PATH: ${{ secrets.VPS_API_PATH }}
        run: |
          rsync -az --delete \
            --exclude vendor \
            --exclude var \
            --exclude .env.local \
            -e "ssh -i ~/.ssh/id_rsa -p ${VPS_PORT:-22}" \
            ./api/ \
            ${VPS_USER}@${VPS_HOST}:${VPS_API_PATH}

      # =========================
      # Install Symfony deps on VPS
      # =========================
      - name: Install Symfony dependencies on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_API_PATH: ${{ secrets.VPS_API_PATH }}
        run: |
          ssh -i ~/.ssh/id_rsa -p ${VPS_PORT:-22} \
          ${VPS_USER}@${VPS_HOST} "
            cd ${VPS_API_PATH} &&
            composer install --no-dev --optimize-autoloader --no-interaction &&
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear &&
            APP_ENV=prod php bin/console cache:warmup
          "