name: Build & Deploy (Safe Simple)

on:
  push:
    branches:
      - main
      - ssr
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Node setup
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # Build frontend
      # =========================
      - name: Install frontend deps
        working-directory: client
        run: npm ci

      - name: Generate Nuxt site
        working-directory: client
        run: npm run generate

      - name: Validate build
        run: test -d client/.output/public

      # =========================
      # SSH setup
      # =========================
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # =========================
      # BACKUP + DEPLOY FRONTEND
      # =========================
      - name: Deploy frontend (safe overwrite)
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "cp -r /var/www/html/client /var/www/html/client_backup_$(date +%s) || true"

          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            --exclude ".git" \
            ./client/.output/public/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/client

      # =========================
      # BACKUP + DEPLOY API
      # =========================
      - name: Deploy Symfony API (safe overwrite)
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "cp -r /var/www/html/api /var/www/html/api_backup_$(date +%s) || true"

          rsync -az \
            --exclude vendor \
            --exclude var \
            --exclude .env.local \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            ./api/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/api

      # =========================
      # Symfony build on server
      # =========================
      - name: Install Symfony deps remotely
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "
            cd /var/www/html/api && \
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist && \
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear && \
            APP_ENV=prod php bin/console cache:warmup
          "