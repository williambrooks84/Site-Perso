name: Deploy (Clean Safe Version)

on:
  push:
    branches:
      - main
      - ssr
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Node setup
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # Build frontend
      # =========================
      - name: Install frontend deps
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run generate

      # =========================
      # SSH setup
      # =========================
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # =========================
      # DEPLOY FRONTEND (CLEAN)
      # =========================
      - name: Deploy frontend
        run: |
          rsync -r --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            ./client/.output/public/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/client/

      # =========================
      # DEPLOY API & DOCKER
      # =========================
      - name: Deploy API with Docker
        run: |
          rsync -r \
            --exclude .env.local \
            --exclude vendor \
            --exclude var/cache \
            --exclude var/log \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            ./api/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/api/

      - name: Deploy api compose file
        run: |
          rsync -r \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" \
            api/docker-compose.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/api/

      # =========================
      # Docker Compose Build & Run
      # =========================
      - name: Build and run Docker containers
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "
            cd /var/www/html/api &&
            docker info >/dev/null &&
            docker-compose down --remove-orphans || true &&
            docker-compose build --no-cache &&
            docker-compose up -d
          "