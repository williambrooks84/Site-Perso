version: '3.3'

services:
  api:
    build:
      context: .
    container_name: symfony_api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: prod
    command: bash -c "composer install --no-dev --optimize-autoloader && php bin/console cache:clear --env=prod && php -S 0.0.0.0:8000 -t public"
